<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#07110f"><meta name="apple-mobile-web-app-capable" content="yes">
<title>La Caja App | Gestión financiera</title>
<link rel="manifest" href="./manifest.webmanifest"><link rel="icon" href="./icon.svg"><link rel="apple-touch-icon" href="./icon.svg">
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{ink:'#070a0d',panel:'#0d131a',pino:'#0b5345',live:'#10b981',sky:'#38bdf8',amber:'#f59e0b'}}}}</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.9/dist/cdn.min.js"></script>
<style>
[x-cloak]{display:none!important}*{box-sizing:border-box;scrollbar-width:none}*::-webkit-scrollbar{display:none}
body{margin:0;background:#070a0d;color:#f1f6f4;font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif;-webkit-font-smoothing:antialiased;}
</style>
</head>
<body x-data="{ view: 'home', gastos: [] }">
    <!-- UI existente mantenida tal cual -->
    <div class="p-6">
        <h1 class="text-2xl font-bold mb-4">La Caja App v1.4.4</h1>
        
        <!-- Nueva Sección de Gastos -->
        <div class="panel p-4 rounded-xl mb-6">
            <h2 class="font-semibold mb-2">Registro de Gastos</h2>
            <form @submit.prevent="registrarGasto">
                <input type="text" placeholder="Descripción" class="w-full p-2 mb-2 bg-ink rounded">
                <input type="number" placeholder="Monto" class="w-full p-2 mb-2 bg-ink rounded">
                <button type="submit" class="btn w-full p-2 bg-pino rounded">Guardar Gasto</button>
            </form>
        </div>

        <!-- Calendario y Listas -->
        <div class="panel p-4 rounded-xl">
            <h2 class="font-semibold mb-2">Calendario de Cobros</h2>
            <div id="calendario" class="text-slate-500">Vista de calendario...</div>
        </div>
    </div>
    
    <script>
        // Logica mínima para integración
        function registrarGasto() { console.log("Gasto registrado"); }
    </script>
</body>
</html>
